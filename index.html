<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #010816; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; }
        
        /* 布局骨架 */
        .dashboard {
            display: grid;
            grid-template-columns: 20% 55% 25%;
            grid-template-rows: 60px 1fr 1fr 250px;
            grid-template-areas: 
                "header header header"
                "left map right1"
                "left map right2"
                "bottom bottom bottom";
            gap: 10px; padding: 10px; height: 100%; box-sizing: border-box;
        }

        .panel { border: 1px solid #08306b; background: rgba(5, 20, 45, 0.6); padding: 10px; }
        
        /* 区域分配 */
        #header { grid-area: header; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #0a4da6; }
        #left { grid-area: left; }
        #map { grid-area: map; background: #02112a; } /* 这里放置地图容器 */
        #right1 { grid-area: right1; }
        #right2 { grid-area: right2; }
        #bottom { grid-area: bottom; }
        
        .title { color: #00d4ff; font-weight: bold; margin-bottom: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="dashboard">
    <div id="header">
        <div style="font-size: 20px; font-weight: bold;">外连态势大屏</div>
        <div>2026/06/02 10:00:00</div>
    </div>
    
    <div id="left" class="panel">
        <div class="title">数据概览</div>
        </div>

    <div id="map" class="panel">
        <div class="title">全球流向态势</div>
        </div>

    <div id="right1" class="panel">
        <div class="title">终端 TOP5</div>
    </div>
    <div id="right2" class="panel">
        <div class="title">域名/目标 TOP5</div>
    </div>

    <div id="bottom" class="panel">
        <div class="title">实时访问监控</div>
        <table style="width:100%; border-collapse: collapse; font-size: 12px; color: #a0cfff;">
            <thead><tr style="border-bottom: 1px solid #08306b;"><th>源IP</th><th>目标IP</th><th>上行</th><th>下行</th><th>应用</th></tr></thead>
            <tbody><tr><td>192.168.10.x</td><td>20.198.xxx</td><td>29KB</td><td>69KB</td><td>HTTPS</td></tr></tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script>
    // 初始化地图逻辑同前述
</script>
</body>
</html>
