<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SING-BOX 全核态势 v9.0 实时版</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@4.9.0/map/js/world.js"></script>
    <style>
        :root { --bg: #010306; --cyan: #00e5ff; --panel: rgba(5, 12, 25, 0.95); }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Consolas', monospace; }
        
        /* 布局定义：地图全占首行 */
        .dashboard-layout {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-areas: 
                "map map map map"
                "m1 m2 m3 m4"
                "m5 m6 m7 m8"
                "m9 m10 m11 m12"
                "m13 m14 m15 m16";
            gap: 8px; padding: 10px; height: 100vh;
        }

        #map-top { grid-area: map; height: 35vh; border: 1px solid #081b3d; }
        
        .panel { background: var(--panel); border: 1px solid #081b3d; padding: 5px; overflow: hidden; display: flex; flex-direction: column; }
        .title { color: var(--cyan); font-size: 10px; font-weight: bold; border-bottom: 1px solid #081b3d; }
        .data-live { font-size: 11px; color: #fff; margin-top: 5px; word-break: break-all; }

        @media (max-width: 800px) {
            .dashboard-layout { grid-template-columns: 1fr; grid-template-areas: "map" "m1" "m2"...; }
        }
    </style>
</head>
<body>

    <div class="dashboard-layout">
        <div id="map-top"></div>
        <div class="panel" style="grid-area: m1;"><div class="title">01 实时吞吐</div><div class="data-live" id="m01">Loading...</div></div>
        <div class="panel" style="grid-area: m5;"><div class="title">05 日志输出</div><div class="data-live" id="m05" style="font-size: 8px;">...</div></div>
        </div>

    <script>
        const map = echarts.init(document.getElementById('map-top'));
        map.setOption({ geo: { map: 'world', roam: true, itemStyle: { areaColor: '#020510' } } });

        // 核心 WebSocket 驱动：将数据注入指定 ID
        function connectKernel() {
            // 请确保你的 sing-box 已开启 external_controller
            const ws = new WebSocket("ws://127.0.0.1:9090/traffic");
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                // 实时更新吞吐数据
                document.getElementById('m01').innerText = `↑ ${data.up} | ↓ ${data.down}`;
                
                // 实时更新其他逻辑...
            };
            
            ws.onerror = () => { document.getElementById('m01').innerText = "连接失败，请检查 API"; };
        }

        connectKernel();
    </script>
</body>
</html>
