<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>外连态势大屏 - Sing-box 监控系统</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@4.9.0/map/js/world.js"></script>
    <style>
        :root {
            --bg-color: #020714;
            --panel-bg: rgba(6, 18, 43, 0.7);
            --border-color: #0f367a;
            --text-main: #a0b2d8;
            --text-highlight: #00f0ff;
            --text-orange: #ff5722;
        }
        body { margin: 0; padding: 0; background-color: var(--bg-color); color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow-x: hidden; }
        
        /* 顶部大标题 */
        .header { text-align: center; padding: 12px 0; font-size: 26px; font-weight: bold; letter-spacing: 3px; color: #fff; background: linear-gradient(to bottom, rgba(0,240,255,0.15) 0%, transparent 100%); border-bottom: 2px solid var(--border-color); position: relative; }
        .header .time-box { position: absolute; right: 20px; top: 18px; font-size: 13px; color: var(--text-main); font-family: monospace; }
        
        /* 完美还原图片的 3 列式网格大布局 */
        .dashboard-container { 
            display: grid; 
            grid-template-columns: 24% 51% 23%; 
            gap: 15px; 
            padding: 15px; 
            box-sizing: border-box; 
            height: calc(100vh - 65px);
            min-height: 800px;
        }
        
        /* 面板基础样式（带炫酷霓虹四角边框） */
        .panel { background-color: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 2px; padding: 12px; position: relative; display: flex; flex-direction: column; box-shadow: inset 0 0 15px rgba(0, 240, 255, 0.05); }
        .panel::before, .panel::after { content: ''; position: absolute; width: 8px; height: 8px; border-color: var(--text-highlight); border-style: solid; }
        .panel::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
        .panel::after { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
        
        .panel-title { font-size: 14px; font-weight: bold; color: var(--text-highlight); margin-bottom: 8px; display: flex; align-items: center; letter-spacing: 1px; }
        .panel-title::before { content: '◤'; margin-right: 6px; font-size: 10px; color: var(--text-highlight); }
        
        .chart-box { flex: 1; width: 100%; height: 100%; min-height: 120px; }
        
        /* 纵向列容器 */
        .left-col { display: flex; flex-direction: column; gap: 15px; }
        .center-col { display: grid; grid-template-rows: 62% calc(38% - 15px); gap: 15px; }
        .right-col { display: flex; flex-direction: column; gap: 15px; }

        /* 顶部 3 个核心 KPI 统计卡片 */
        .stats-wrapper { display: flex; justify-content: space-between; gap: 10px; }
        .stat-card { flex: 1; background: rgba(11, 33, 74, 0.5); border: 1px solid rgba(15, 54, 122, 0.6); padding: 8px; border-left: 3px solid var(--text-highlight); }
        .stat-card .title { font-size: 11px; color: var(--text-main); }
        .stat-card .num-row { display: flex; align-items: baseline; justify-content: space-between; margin-top: 4px; }
        .stat-card .curr-num { font-size: 18px; color: var(--text-highlight); font-weight: bold; font-family: monospace; }
        .stat-card .peak-num { font-size: 11px; color: #4caf50; }

        /* 外连国家排行列表组件 */
        .country-panel { flex: 1; display: flex; flex-direction: column; }
        .country-list { flex: 1; overflow-y: auto; margin-top: 5px; padding-right: 4px; }
        .country-item { display: flex; align-items: center; justify-content: space-between; padding: 6px 4px; border-bottom: 1px dashed rgba(15, 54, 122, 0.3); font-size: 12px; }
        .country-name { display: flex; align-items: center; gap: 8px; color: #fff; }
        .country-count { color: var(--text-highlight); font-weight: bold; font-family: monospace; }
        
        /* 底部“实时访问监控”专用滚动层结构 */
        .bottom-table-panel { overflow: hidden; }
        .table-wrapper { flex: 1; overflow-y: auto; overflow-x: auto; margin-top: 5px; position: relative; }
        
        /* 表格样式细节 */
        table { width: 100%; border-collapse: collapse; font-size: 11px; text-align: left; }
        thead th { position: sticky; top: 0; background-color: #061535; color: var(--text-highlight); padding: 8px; border-bottom: 1px solid var(--border-color); white-space: nowrap; z-index: 10; }
        tbody td { padding: 6px 8px; border-bottom: 1px dashed rgba(20, 53, 110, 0.4); color: #c0d2f8; white-space: nowrap; }
        tbody tr:hover { background-color: rgba(0, 240, 255, 0.08); }

        /* 大屏专属科技微型滚动条 */
        .table-wrapper::-webkit-scrollbar, .country-list::-webkit-scrollbar { width: 5px; height: 5px; }
        .table-wrapper::-webkit-scrollbar-track, .country-list::-webkit-scrollbar-track { background: rgba(15, 54, 122, 0.1); }
        .table-wrapper::-webkit-scrollbar-thumb, .country-list::-webkit-scrollbar-thumb { background: rgba(0, 240, 255, 0.25); border-radius: 2px; }
        .table-wrapper::-webkit-scrollbar-thumb:hover, .country-list::-webkit-scrollbar-thumb:hover { background: rgba(0, 240, 255, 0.6); }

        /* 统一控制所有列表的滚动条 */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(15, 54, 122, 0.5); }
    </style>
</head>
<body>

    <div class="header">
        外连态势大屏
        <div class="time-box" id="liveClock">2026/06/02 08:19:00</div>
    </div>

    <div class="dashboard-container">
        <div class="left-col">
            <div class="stats-wrapper">
                <div class="stat-card">
                    <div class="title">外连终端数</div>
                    <div class="num-row"><span class="curr-num" id="curr-terminals">44</span><span class="peak-num">峰值: 44</span></div>
                </div>
                <div class="stat-card">
                    <div class="title">外连域名数</div>
                    <div class="num-row"><span class="curr-num" id="curr-domains">54</span><span class="peak-num">峰值: 54</span></div>
                </div>
                <div class="stat-card">
                    <div class="title">外连目标IP数</div>
                    <div class="num-row"><span class="curr-num" id="curr-ips">89</span><span class="peak-num">峰值: 89</span></div>
                </div>
            </div>
            <div class="panel country-panel">
                <div class="panel-title">外连国家</div>
                <div class="country-list" id="countryList">
                    </div>
            </div>
            <div class="panel" style="height: 32%;">
                <div class="panel-title">外连访问趋势</div>
                <div id="trendChart" class="chart-box"></div>
            </div>
        </div>

        <div class="center-col">
            <div class="panel">
                <div class="panel-title">全球节点连接态势 (Sing-box 出站跳跃)</div>
                <div id="mapChart" class="chart-box"></div>
            </div>
            <div class="panel bottom-table-panel">
                <div class="panel-title">实时访问监控</div>
                <div class="table-wrapper">
                    <table id="connectionsTable">
                        <thead>
                            <tr>
                                <th>源IP</th>
                                <th>源端口</th>
                                <th>目标IP/域名</th>
                                <th>目标端口</th>
                                <th>地理位置</th>
                                <th>上行流量</th>
                                <th>下行流量</th>
                                <th>应用协议</th>
                                <th>备注</th>
                                <th>域名</th>
                            </tr>
                        </thead>
                        <tbody>
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="right-col">
            <div class="panel">
                <div class="panel-title">外连最多的终端 TOP 5</div>
                <div id="topTerminalChart" class="chart-box"></div>
            </div>
            <div class="panel">
                <div class="panel-title">外连最多的域名 TOP 5</div>
                <div id="topDomainChart" class="chart-box"></div>
            </div>
            <div class="panel">
                <div class="panel-title">外连最多的目标 TOP 5</div>
                <div id="topTargetChart" class="chart-box"></div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. 时钟处理 ---
        function updateClock() {
            const now = new Date();
            const pad = (n) => n.toString().padStart(2, '0');
            document.getElementById('liveClock').innerText = `${now.getFullYear()}/${pad(now.getMonth()+1)}/${pad(now.getDate())} 星期${['日','一','二','三','四','五','六'][now.getDay()]} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
        }
        setInterval(updateClock, 1000);

        // --- 2. 初始化所有 ECharts 实例 ---
        const trendChart = echarts.init(document.getElementById('trendChart'));
        const mapChart = echarts.init(document.getElementById('mapChart'));
        const topTerminalChart = echarts.init(document.getElementById('topTerminalChart'));
        const topDomainChart = echarts.init(document.getElementById('topDomainChart'));
        const topTargetChart = echarts.init(document.getElementById('topTargetChart'));

        // --- 3. 配置核心地理坐标 (基于本地出站流向海外节点的设计) ---
        const geoCoordMap = {
            '中国本地': [116.4074, 39.9042],
            '美国节点': [-100.5729, 37.7510],
            '新加坡节点': [103.8198, 1.3521],
            '日本节点': [138.2529, 36.2048],
            '法国节点': [2.2137, 46.2276],
            '韩国节点': [127.7669, 35.9078],
            '瑞典节点': [18.6435, 60.1282],
            '加拿大节点': [-106.3468, 56.1304]
        };

        const mapData = [
            { fromName: '中国本地', toName: '美国节点', value: 87 },
            { fromName: '中国本地', toName: '新加坡节点', value: 34 },
            { fromName: '中国本地', toName: '日本节点', value: 16 },
            { fromName: '中国本地', toName: '瑞典节点', value: 6 },
            { fromName: '中国本地', toName: '韩国节点', value: 5 },
            { fromName: '中国本地', toName: '法国节点', value: 4 },
            { fromName: '中国本地', toName: '加拿大节点', value: 3 }
        ];

        // 转换出站跳跃航线数据
        const convertData = function (data) {
            const res = [];
            for (let i = 0; i < data.length; i++) {
                const dataItem = data[i];
                const fromCoord = geoCoordMap[dataItem.fromName];
                const toCoord = geoCoordMap[dataItem.toName];
                if (fromCoord && toCoord) {
                    res.push({
                        fromName: dataItem.fromName,
                        toName: dataItem.toName,
                        coords: [fromCoord, toCoord],
                        value: dataItem.value
                    });
                }
            }
            return res;
        };

        // --- 4. 地图组件配置 (出站节点连接跳跃动效) ---
        const mapOption = {
            backgroundColor: 'transparent',
            tooltip: { trigger: 'item', formatter: '{b}' },
            geo: {
                map: 'world',
                roam: true,
                zoom: 1.2,
                center: [10, 25],
                label: { emphasis: { show: false } },
                itemStyle: {
                    normal: { areaColor: '#071635', borderColor: '#00f0ff', borderWidth: 0.6 },
                    emphasis: { areaColor: '#102e6b' }
                }
            },
            series: [
                // 绘制跳跃闪烁流动航线
                {
                    type: 'lines', zlevel: 1,
                    effect: { show: true, period: 4, trailLength: 0.1, symbol: 'arrow', symbolSize: 6 },
                    lineStyle: { normal: { color: '#00f0ff', width: 1.2, opacity: 0.5, curveness: 0.25 } },
                    data: convertData(mapData)
                },
                // 绘制目标出站海外节点的气泡效应
                {
                    type: 'effectScatter', coordinateSystem: 'geo', zlevel: 2,
                    rippleEffect: { brushType: 'stroke', scale: 4 },
                    label: { normal: { show: true, position: 'right', formatter: '{b}' } },
                    symbolSize: function (val) { return Math.max(8, Math.min(val[2] * 0.3, 20)); },
                    itemStyle: { normal: { color: '#00f0ff' } },
                    data: mapData.map(item => ({
                        name: item.toName,
                        value: geoCoordMap[item.toName].concat([item.value])
                    }))
                },
                // 本地源点的定位标记
                {
                    type: 'scatter', coordinateSystem: 'geo', zlevel: 2,
                    symbolSize: 12,
                    itemStyle: { normal: { color: '#ffeb3b' } },
                    label: { normal: { show: true, position: 'top', formatter: '本地客户端' } },
                    data: [{ name: '中国本地', value: geoCoordMap['中国本地'] }]
                }
            ]
        };
        mapChart.setOption(mapOption);

        // --- 5. 趋势图与柱状图通用核心配置函数 ---
        const getBarOption = (data, axisData, barColor) => ({
            grid: { left: '4%', right: '8%', bottom: '3%', top: '5%', containLabel: true },
            xAxis: { type: 'value', splitLine: { show: false }, axisLabel: { color: '#a0b2d8', fontSize: 10 } },
            yAxis: { type: 'category', data: axisData, axisLine: { lineStyle: { color: '#0f367a' } }, axisLabel: { color: '#a0b2d8', fontSize: 10 } },
            series: [{
                type: 'bar', data: data, barWidth: 11,
                itemStyle: { color: new echarts.graphic.LinearGradient(1, 0, 0, 0, [{ offset: 0, color: barColor }, { offset: 1, color: '#0f367a' }]), borderRadius: [0, 2, 2, 0] }
            }]
        });

        // 渲染左侧波动趋势
        let trendTime = [], upSpeed = [], downSpeed = [];
        const trendOption = {
            tooltip: { trigger: 'axis' },
            grid: { left: '4%', right: '4%', bottom: '5%', top: '15%', containLabel: true },
            xAxis: { type: 'category', boundaryGap: false, data: trendTime, axisLine: { lineStyle: { color: '#0f367a' } } },
            yAxis: { type: 'value', splitLine: { lineStyle: { color: '#0f367a', type: 'dashed' } } },
            series: [
                { name: '上传', type: 'line', smooth: true, itemStyle: { color: '#00f0ff' }, areaStyle: { opacity: 0.1 }, data: upSpeed },
                { name: '下载', type: 'line', smooth: true, itemStyle: { color: '#ffeb3b' }, areaStyle: { opacity: 0.1 }, data: downSpeed }
            ]
        };
        trendChart.setOption(trendOption);


        // --- 6. 数据源动态渲染/模拟对接引擎 ---
        function generateDashboardData() {
            // A. 国家排行榜渲染
            const countries = [
                { name: '🇺🇸 美国', code: 'Proxy-US', count: 87 },
                { name: '🇸🇬 新加坡', code: 'Proxy-SG', count: 34 },
                { name: '🇯🇵 日本', code: 'Proxy-JP', count: 16 },
                { name: '🇸🇪 瑞典', code: 'Tor Out', count: 6 },
                { name: '🇰🇷 韩国', code: 'WARP', count: 5 }
            ];
            const listContainer = document.getElementById('countryList');
            listContainer.innerHTML = countries.map(c => `
                <div class="country-item">
                    <span class="country-name">${c.name} <small style="color:#537cb4">[${c.code}]</small></span>
                    <span class="country-count">${c.count}</span>
                </div>
            `).join('');

            // B. 右侧三组 TOP 5 动态数据填充
            topTerminalChart.setOption(getBarOption([12, 18, 24, 48, 56], ['192.168.10.140', '192.168.10.87', 'TEST-PC', '192.168.3.103', '192.168.10.96'].reverse(), '#ff5722'));
            topDomainChart.setOption(getBarOption([4, 6, 7, 9, 14], ['mtalk.google.com', 'v10.events.data.microsoft', 'self.events.data.microsoft', 'array812.prod.do', 'client.wns.windows.com'].reverse(), '#00f0ff'));
            topTargetChart.setOption(getBarOption([5, 7, 8, 10, 12], ['142.250.176.14', '52.143.87.28', '20.197.71.89', '20.198.162.76', '20.198.162.78'].reverse(), '#ffeb3b'));

            // C. 底部表格实时数据变更 (对齐 Sing-box 元数据字段)
            const mockConnections = [
                { src: '192.168.10.239', srcP: 62014, dst: '20.198.162.78', dstP: 443, geo: '🇸🇬 新加坡', up: '29 KB', down: '69 KB', app: 'VLESS (xhttp)', info: 'Reality 规则过滤', domain: 'skydrive.wns.windows.com' },
                { src: '192.168.10.87', srcP: 18736, dst: '92.243.24.197', dstP: 85, geo: '🇫🇷 法国', up: '98 B', down: '98 B', app: 'ICMP', info: 'Direct 直连', domain: '-' },
                { src: '192.168.10.96', srcP: 62775, dst: '142.250.188.2', dstP: 443, geo: '🇺🇸 美国', up: '4 KB', down: '4 KB', app: 'Hysteria2', info: 'Proxy 代理转发', domain: 'google.com' },
                { src: '192.168.3.103', srcP: 52524, dst: '52.143.87.28', dstP: 443, geo: '🇺🇸 美国', up: '2 KB', down: '5 KB', app: 'VLESS', info: 'WARP 出站解锁', domain: 'array812.prod.do.dsp' },
                { src: '192.168.3.5', srcP: 54886, dst: '20.198.162.76', dstP: 443, geo: '🇸🇬 新加坡', up: '5 KB', down: '2 KB', app: 'DIRECT', info: '广告拦截规则', domain: '-' }
            ];
            
            const tbody = document.querySelector('#connectionsTable tbody');
            tbody.innerHTML = mockConnections.map(c => `
                <tr>
                    <td>${c.src}</td>
                    <td>${c.srcP}</td>
                    <td>${c.dst}</td>
                    <td>${c.dstP}</td>
                    <td>${c.geo}</td>
                    <td>${c.up}</td>
                    <td>${c.down}</td>
                    <td><span style="color:var(--text-highlight)">${c.app}</span></td>
                    <td><small>${c.info}</small></td>
                    <td style="max-width:140px; overflow:hidden; text-overflow:ellipsis;">${c.domain}</td>
                </tr>
            `).join('');

            // D. 左下角趋势图表高频动态刷新
            const now = new Date();
            if(trendTime.length > 15) { trendTime.shift(); upSpeed.shift(); downSpeed.shift(); }
            trendTime.push(`${now.getHours()}:${now.getMinutes()}:${now.getSeconds()}`);
            upSpeed.push((Math.random() * 40 + 5).toFixed(1));
            downSpeed.push((Math.random() * 120 + 20).toFixed(1));
            trendChart.setOption({ xAxis: { data: trendTime }, series: [{ data: upSpeed }, { data: downSpeed }] });
        }

        // --- 7. 大屏自适应拉伸机制 ---
        window.addEventListener('resize', () => {
            trendChart.resize();
            mapChart.resize();
            topTerminalChart.resize();
            topDomainChart.resize();
            topTargetChart.resize();
        });

        // 首次加载并触发定时刷新循环
        generateDashboardData();
        setInterval(generateDashboardData, 2000);
    </script>
</body>
</html>
