<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SING-BOX 内核态势感知 v7.0 (稳健版)</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@4.9.0/map/js/world.js"></script>
    <style>
        body, html { margin: 0; padding: 0; background: #010306; color: #fff; font-family: monospace; height: 100%; overflow-x: hidden; }
        
        /* 1. 地图层：占满顶部 */
        #map-top { width: 100%; height: 40vh; min-height: 200px; border-bottom: 2px solid #00e5ff; }
        
        /* 2. 主容器：使用 Flex 布局解决 Grid 崩溃风险 */
        .container { display: flex; flex-wrap: wrap; padding: 10px; gap: 10px; }
        
        /* 3. 面板逻辑 */
        .panel { 
            flex: 1 1 calc(25% - 20px); /* 桌面端每行4个 */
            min-width: 250px; 
            background: rgba(5, 12, 25, 0.9); 
            border: 1px solid #0a1e3d; 
            padding: 10px; 
            box-sizing: border-box; 
        }
        
        /* 移动端优化 */
        @media (max-width: 800px) { .panel { flex: 1 1 100%; } }
        
        .title { color: #00e5ff; font-size: 12px; font-weight: bold; margin-bottom: 8px; border-bottom: 1px solid #0a1e3d; padding-bottom: 4px; }
        .data { font-size: 11px; color: #8899aa; }
    </style>
</head>
<body>

    <div id="map-top"></div>

    <div class="container" id="main-container">
        </div>

    <script>
        // 初始化地图
        const map = echarts.init(document.getElementById('map-top'));
        map.setOption({ geo: { map: 'world', roam: true, itemStyle: { areaColor: '#020510' } } });

        // 模块定义
        const modules = [
            "01 流量吞吐", "02 入站探测", "03 DNS 解析", "04 缓存状态",
            "05 日志终端", "06 L4 传输", "07 会话审计", "08 策略矩阵",
            "09 SRS 规则", "10 路由热度", "11 内存开销", "12 全球流向",
            "13 NTP 同步", "14 进程劫持", "15 CacheDB", "16 MUX 复用"
        ];

        // 渲染模块
        const container = document.getElementById('main-container');
        modules.forEach(m => {
            const div = document.createElement('div');
            div.className = 'panel';
            div.innerHTML = `<div class="title">${m}</div><div class="data">连接中...</div>`;
            container.appendChild(div);
        });

        // 适配 Resize
        window.onresize = () => { map.resize(); };
    </script>
</body>
</html>
